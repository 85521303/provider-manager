name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            bundles: nsis
            artifact-name: provider-manager-windows
            artifact-path: |
              dist/tauri-target/release/bundle/nsis/*.exe
              dist/tauri-target/release/*.exe
              dist/sidecar/*.exe
          - name: macOS
            os: macos-latest
            bundles: dmg
            artifact-name: provider-manager-macos
            artifact-path: |
              dist/tauri-target/release/bundle/dmg/*.dmg
              dist/tauri-target/release/bundle/macos/*.app
              dist/tauri-target/release/provider-manager-desktop
              dist/sidecar/*
          - name: Linux
            os: ubuntu-22.04
            bundles: appimage,deb
            artifact-name: provider-manager-linux
            artifact-path: |
              dist/tauri-target/release/bundle/appimage/*.AppImage
              dist/tauri-target/release/bundle/deb/*.deb
              dist/tauri-target/release/provider-manager-desktop
              dist/sidecar/*

    env:
      CARGO_TERM_COLOR: always
      CPM_SKIP_CARGO_MIRROR: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Windows packaging dependencies
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install nsis sqlite --no-progress -y
          "$env:ProgramFiles\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2 \
            patchelf \
            sqlite3

      - name: Install npm dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Generate app icons
        run: npm run tauri:icons

      - name: Prepare desktop sidecar
        run: npm run tauri:prepare

      - name: Build desktop bundle
        run: npx tauri build --bundles "${{ matrix.bundles }}"
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/dist/tauri-target

      - name: Upload ${{ matrix.name }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files
          find release-artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*setup.exe" -o \
            -name "provider-manager-desktop.exe" \
          \) -print0 | while IFS= read -r -d '' file; do
            base="$(basename "$file")"
            target="release-files/$base"
            if [ -e "$target" ]; then
              dir="$(basename "$(dirname "$file")")"
              target="release-files/${dir}-${base}"
            fi
            cp "$file" "$target"
          done
          find release-files -maxdepth 1 -type f -print

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
          body: |
            ProviderManager ${{ github.ref_name }}

            包含 Windows、macOS、Linux 三个平台的桌面应用构建产物。
