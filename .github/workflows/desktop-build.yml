name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            bundles: nsis
            artifact-name: provider-manager-windows
            artifact-path: |
              dist/tauri-target/release/bundle/nsis/*.exe
              dist/tauri-target/release/*.exe
              dist/sidecar/*.exe
          - name: macOS
            os: macos-latest
            bundles: dmg
            artifact-name: provider-manager-macos
            artifact-path: |
              dist/tauri-target/release/bundle/dmg/*.dmg
              dist/tauri-target/release/bundle/macos/*.app
              dist/tauri-target/release/provider-manager-desktop
              dist/sidecar/*
          - name: Linux
            os: ubuntu-22.04
            bundles: appimage,deb
            artifact-name: provider-manager-linux
            artifact-path: |
              dist/tauri-target/release/bundle/appimage/*.AppImage
              dist/tauri-target/release/bundle/deb/*.deb
              dist/tauri-target/release/provider-manager-desktop
              dist/sidecar/*

    env:
      CARGO_TERM_COLOR: always
      CPM_SKIP_CARGO_MIRROR: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Windows packaging dependencies
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install nsis sqlite --no-progress -y
          "$env:ProgramFiles\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2 \
            patchelf \
            sqlite3

      - name: Install npm dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Generate app icons
        run: npm run tauri:icons

      - name: Build desktop bundle
        run: node scripts/tauri-with-dist-target.js build --bundles "${{ matrix.bundles }}"

      - name: Upload ${{ matrix.name }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 14
