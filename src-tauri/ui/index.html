<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ProviderManager</title>
    <style>
      :root {
        color: #18212f;
        background: #f5f7fa;
        font: 14px/1.5 "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        display: grid;
        justify-items: center;
        gap: 12px;
      }

      .mark {
        display: grid;
        place-items: center;
        width: 64px;
        height: 64px;
        border-radius: 14px;
        color: #ffffff;
        background: #000000;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.08em;
      }

      h1 {
        margin: 0;
        font-size: 18px;
      }

      p {
        margin: 0;
        color: #657386;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">PM</div>
      <h1>ProviderManager</h1>
      <p>正在启动本地服务...</p>
    </main>
  </body>
</html>
